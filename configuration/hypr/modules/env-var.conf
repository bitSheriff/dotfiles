#############################
### ENVIRONMENT VARIABLES ###
#############################

# only those which are needed for Hyprland, the others are defined in ~/.config/shell/envvars to use them in every WM and Desktop
# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Adawita

# Output folder for the hyprshot Screenshots
env = HYPRSHOT_DIR, $HOME/Pictures/Screenshots

# To use nvidia with wayland
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# Dark mode hints
env = QT_QPA_PLATFORMTHEME,gtk2
env = GDK_BACKEND,wayland,x11,*
env = GTK_THEME,Adwaita:dark

# fix Wayland bug with Rust Tauri
# https://github.com/tauri-apps/tauri/issues/10702
env = WEBKIT_DISABLE_DMABUF_RENDERER,1 

# Ensure icons and applications are found correctly by all launchers
env = XDG_DATA_DIRS,/home/benjamin/.nix-profile/share:/home/benjamin/.local/share/flatpak/exports/share:/var/lib/flatpak/exports/share:/run/current-system/sw/share:/usr/local/share:/usr/share

# Add local bin to PATH for Hyprland
env = PATH,/home/benjamin/.local/share/bin:/home/benjamin/.local/bin:$PATH
